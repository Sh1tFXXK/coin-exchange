spring:
    application:
        name: exchange-service
    cloud:  # nacos地址
        nacos:
            server-addr: nacos-server:8848
            config:
                file-extension: yaml
        stream:
            rocketmq:
                binder:
                    name-server: rocket-server:9876
            bindings:
                order_out:
                    destination: order_in
                    content-type: application/plain
                cancel_order_in:
                    destination: cancel_order_in
                    content-type: application/plain
                    group: cancel-order-consumer-group
                exchange_trade_in:
                    destination: exchange_trade_in
                    content-type: application/plain
                    group: exchange-trade-consumer-group
        # ... existing code ...
    # 拉取的配置文件的dataID =  exchange-service-dev.yaml
    profiles:
        active: dev