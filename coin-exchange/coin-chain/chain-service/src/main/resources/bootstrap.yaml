spring:
    application:
        name: chain-service
    cloud:  # nacos 地址
        nacos:
            server-addr: nacos-server:8848
            config:
                file-extension: yaml
        stream:
            bindings:
                tio_group:
                    destination: tio_group
                    content-type: application/plain
                    group: order-group
            rocketmq:
                binder:
                    name-server: rocket-server:9876
    profiles:
        active: dev

tio:
    websocket:
        server:
            port: 8326
            heartbeat-timeout: 600000
